deploy_repo = "henosis-playground/deploy"
manifest_branch = "main"
gate_command = "henosis-gate"
gate_check_run_name = "Henosis merge gate"
advisory_gate_check_run_name = "Henosis advisory merge gate"
preview_mode = "on-demand"
queue_tick_interval_secs = 15
cmd_prefix = "@henosis-bot"
dev_manifest_path = "worlds/dev.toml"

[core_api]
endpoint = "http://core:8080"
